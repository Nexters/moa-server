spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${secret.db.prod.host}:${secret.db.prod.port}/${secret.db.prod.name}?serverTimezone=Asia/Seoul&useUniCode=yes&characterEncoding=UTF-8
    username: ${secret.db.prod.username}
    password: ${secret.db.prod.password}
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: validate
  lifecycle:
    timeout-per-shutdown-phase: 60s

server:
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

jwt:
  secret-key: ${secret.jwt.prod.access.secret-key}
  expiration-milliseconds: ${secret.jwt.prod.access.expiration}

oidc:
  kakao:
    jwks-uri: ${secret.oauth.kakao.jwks-uri}
    cache-ttl-seconds: ${secret.oauth.cache-ttl-seconds}
  apple:
    jwks-uri: ${secret.oauth.apple.jwks-uri}
    cache-ttl-seconds: ${secret.oauth.cache-ttl-seconds}

logging:
  discord:
    webhook-uri: ${secret.discord.webhook-uri}
