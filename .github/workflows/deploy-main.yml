name: Deploy on Push to Main

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  setup:
    runs-on: ubuntu-latest

    outputs:
      docker_tag: ${{ steps.calc.outputs.docker_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_TOKEN }}

      - name: Calculate version
        id: calc
        run: |
          version=$(git rev-parse --short HEAD)
          echo "docker_version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        working-directory: ./
        run: |
          chmod +x ./gradlew
          ./gradlew test

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./Dockerfile
          push: true
          tags: godqhr721/moa_server:${{ steps.calc.outputs.docker_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: setup
    runs-on:
      - self-hosted

    steps:
      - name: Checkout deploy scripts
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scripts

      - name: Check version to deploy
        run: |
          echo "Deploying target version: ${{ needs.setup.outputs.docker_tag }}"

      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | sudo docker login --username ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Run Blue-Green Deploy
        env:
          DOCKER_IMAGE: godqhr721/moa_server
        run: |
          chmod +x scripts/deploy.sh
          sudo -E bash scripts/deploy.sh "${{ needs.setup.outputs.docker_tag }}"

      - name: Verify deployment
        run: |
          echo "=== Deployment Status ==="
          echo "Active color: $(cat /home/ubuntu/app/active-color)"
          echo "Last 5 deployments:"
          tail -5 /home/ubuntu/app/deploy-history
